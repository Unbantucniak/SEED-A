name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-lock.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: Run experiment smoke
        run: |
          python experiments/run_g3_ablation.py --seeds 11 --rounds 1 --scenarios full --output-dir experiments/results

      - name: Run H1 packaging dry-run
        run: |
          python experiments/run_h1_packaging.py --dry-run --json-error-policy strict
